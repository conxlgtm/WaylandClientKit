name: check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ci_mode:
        description: CI depth to run
        required: true
        default: cheap
        type: choice
        options:
          - cheap
          - required
          - full
  schedule:
    - cron: '17 8 * * 1'

permissions:
  contents: read

jobs:
  cheap:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            curl \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-bin \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            ripgrep \
            unzip \
            wayland-protocols
      - name: Install SwiftLint
        run: swift run wck tools install-swiftlint --destination /usr/local/bin
      - name: Toolchain smoke
        run: swift run wck tools toolchain-smoke
      - name: Cheap check
        run: swift run wck ci cheap

  required:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.ci_mode != 'cheap' }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-bin \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            wayland-protocols
      - name: Required build and tests
        run: swift run wck ci required

  check:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            curl \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-bin \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            ripgrep \
            unzip \
            wayland-protocols
      - name: Install SwiftLint
        run: swift run wck tools install-swiftlint --destination /usr/local/bin
      - name: Toolchain smoke
        run: swift run wck tools toolchain-smoke
      - name: Bootstrap checks
        run: |
          swift run wck bootstrap check
          swift run wck bootstrap maintainer-check
          swift run wck bootstrap install-command --package-manager apt-get
          swift run wck bootstrap install-command --package-manager dnf
          swift run wck bootstrap install-command --package-manager pacman
          swift run wck bootstrap install-command --package-manager zypper
          swift run wck bootstrap install-command --package-manager apk
          swift run wck bootstrap install-command --package-manager emerge
          swift run wck bootstrap install-command --package-manager nix
      - name: Full check
        run: swift run wck ci check

  generated-freshness:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install generation dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            libwayland-bin \
            libwayland-dev \
            pkg-config \
            wayland-protocols
      - name: Verify generated artifacts
        run: swift run wck protocols verify-generated

  release-build:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            curl \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-bin \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            ripgrep \
            unzip \
            wayland-protocols \
            weston
      - name: Install SwiftLint
        run: swift run wck tools install-swiftlint --destination /usr/local/bin
      - name: Release check
        run: swift run wck ci release

  sanitizer-tsan:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-22.04
    container:
      image: swift:6.3.2-noble
      # TSan needs a fixed address layout. Permit setarch to establish it before
      # Swift starts so the hosted test bundle does not depend on runtime re-exec.
      options: --security-opt seccomp=unconfined
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install sanitizer dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            coreutils \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-bin \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            ripgrep \
            util-linux \
            wayland-protocols \
            weston
      - name: ThreadSanitizer runtime probe
        run: |
          probe_directory="$(mktemp -d)"
          trap 'rm -rf "$probe_directory"' EXIT
          printf '%s\n' 'print("ThreadSanitizer runtime ready")' \
            > "$probe_directory/probe.swift"
          swiftc -sanitize=thread \
            "$probe_directory/probe.swift" \
            -o "$probe_directory/probe"
          setarch "$(uname -m)" -R "$probe_directory/probe"
      - name: ThreadSanitizer tests
        run: setarch "$(uname -m)" -R swift run wck test tsan
        env:
          TSAN_OPTIONS: verbosity=1:log_path=stderr
      - name: Headless request-path ThreadSanitizer tests
        run: |
          setarch "$(uname -m)" -R \
            swift run wck smoke headless -- wck test request-paths-tsan
        env:
          TSAN_OPTIONS: verbosity=1:log_path=stderr

  sanitizer-asan:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install sanitizer dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            coreutils \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-bin \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            ripgrep \
            wayland-protocols \
            weston
      - name: AddressSanitizer tests
        run: swift run wck test asan
        env:
          ASAN_OPTIONS: detect_leaks=0
      - name: Headless request-path AddressSanitizer tests
        run: swift run wck smoke headless -- wck test request-paths-asan

  wayland-smoke:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install smoke dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            coreutils \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            wayland-protocols \
            weston
      - name: Run headless smoke checks
        run: swift run wck smoke headless -- wck smoke live
      - name: Run headless integration checks
        run: swift run wck smoke headless -- wck smoke integration
      - name: Run headless request-path checks
        run: swift run wck smoke headless -- wck test request-paths
