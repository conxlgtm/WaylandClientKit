name: check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            curl \
            git \
            libdrm-dev \
            libgbm-dev \
            libwayland-dev \
            libxkbcommon-dev \
            make \
            pkg-config \
            ripgrep \
            unzip \
            wayland-protocols
      - name: Install SwiftLint
        run: |
          ./scripts/dev/install-swiftlint.sh "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Tool versions
        run: |
          swift --version
          pkg-config --modversion gbm
          pkg-config --modversion libdrm
          pkg-config --modversion wayland-client
          pkg-config --modversion xkbcommon
          command -v wayland-scanner
          swiftlint version
      - name: Dogfood bootstrap script
        run: |
          expect_bootstrap_failure() {
            expected_message="$1"
            shift

            output="$("$@" 2>&1)" && {
              echo "expected command to fail: $*"
              exit 1
            }

            if ! printf '%s\n' "$output" | grep -F --quiet -- "$expected_message"; then
              echo "expected error message: $expected_message"
              echo "$output"
              exit 1
            fi
          }

          ./scripts/dev/bootstrap-linux.sh --check
          ./scripts/dev/bootstrap-linux.sh --maintainer
          ./scripts/dev/bootstrap-linux.sh --dry-run
          ./scripts/dev/bootstrap-linux.sh --dry-run --package-manager emerge
          ./scripts/dev/bootstrap-linux.sh --dry-run --package-manager nix

          expect_bootstrap_failure \
            "choose only one mode: --check, --install, or --dry-run" \
            ./scripts/dev/bootstrap-linux.sh --install --dry-run
          expect_bootstrap_failure \
            "choose only one mode: --check, --install, or --dry-run" \
            ./scripts/dev/bootstrap-linux.sh --check --install
          expect_bootstrap_failure \
            "--dry-run cannot be combined with --build" \
            ./scripts/dev/bootstrap-linux.sh --dry-run --build
          expect_bootstrap_failure \
            "--dry-run cannot be combined with --maintainer" \
            ./scripts/dev/bootstrap-linux.sh --dry-run --maintainer
          expect_bootstrap_failure \
            "STRICT_SWIFT must be 0 or 1" \
            env STRICT_SWIFT=false ./scripts/dev/bootstrap-linux.sh --check
          expect_bootstrap_failure \
            "STRICT_SWIFT must be 0 or 1" \
            env STRICT_SWIFT=2 ./scripts/dev/bootstrap-linux.sh --check
          expect_bootstrap_failure \
            "unsupported package manager: brew" \
            ./scripts/dev/bootstrap-linux.sh --dry-run --package-manager brew
          expect_bootstrap_failure \
            "Nix support is shell-based" \
            ./scripts/dev/bootstrap-linux.sh --install --package-manager nix
      - name: Check
        run: make check

  generated-freshness:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install generation dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            libdrm-dev \
            libgbm-dev \
            libwayland-dev \
            pkg-config \
            wayland-protocols
      - name: Verify generated artifacts
        run: ./scripts/protocols/verify-generated.sh

  release-build:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            git \
            libdrm-dev \
            libgbm-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            wayland-protocols
      - name: Release build
        run: |
          swift build --disable-index-store -c release
          swift build --disable-index-store -c release --target SwiftWaylandDemo
          swift build --disable-index-store -c release --product swift-wayland-smoke
          ./scripts/shims/verify-release-shim-symbols.sh

  wayland-smoke:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install smoke dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            coreutils \
            git \
            libdrm-dev \
            libgbm-dev \
            libwayland-dev \
            libxkbcommon-dev \
            make \
            pkg-config \
            wayland-protocols \
            weston
      - name: Run headless Wayland checks
        run: make wayland-headless
