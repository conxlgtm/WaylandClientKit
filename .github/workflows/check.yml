name: check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            curl \
            git \
            libwayland-dev \
            libxkbcommon-dev \
            make \
            pkg-config \
            ripgrep \
            unzip \
            wayland-protocols
      - name: Install SwiftLint
        run: |
          ./Scripts/install-swiftlint.sh "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Tool versions
        run: |
          swift --version
          pkg-config --modversion wayland-client
          pkg-config --modversion xkbcommon
          command -v wayland-scanner
          swiftlint version
      - name: Dogfood bootstrap script
        run: |
          expect_bootstrap_failure() {
            expected_message="$1"
            shift

            output="$("$@" 2>&1)" && {
              echo "expected command to fail: $*"
              exit 1
            }

            if ! printf '%s\n' "$output" | grep -F --quiet -- "$expected_message"; then
              echo "expected error message: $expected_message"
              echo "$output"
              exit 1
            fi
          }

          ./Scripts/bootstrap-linux.sh --check
          ./Scripts/bootstrap-linux.sh --maintainer
          ./Scripts/bootstrap-linux.sh --dry-run

          expect_bootstrap_failure \
            "choose only one mode: --check, --install, or --dry-run" \
            ./Scripts/bootstrap-linux.sh --install --dry-run
          expect_bootstrap_failure \
            "choose only one mode: --check, --install, or --dry-run" \
            ./Scripts/bootstrap-linux.sh --check --install
          expect_bootstrap_failure \
            "--dry-run cannot be combined with --build" \
            ./Scripts/bootstrap-linux.sh --dry-run --build
          expect_bootstrap_failure \
            "--dry-run cannot be combined with --maintainer" \
            ./Scripts/bootstrap-linux.sh --dry-run --maintainer
          expect_bootstrap_failure \
            "STRICT_SWIFT must be 0 or 1" \
            env STRICT_SWIFT=false ./Scripts/bootstrap-linux.sh --check
          expect_bootstrap_failure \
            "STRICT_SWIFT must be 0 or 1" \
            env STRICT_SWIFT=2 ./Scripts/bootstrap-linux.sh --check
      - name: Check
        run: make check

  generated-freshness:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install generation dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            libwayland-dev \
            pkg-config \
            wayland-protocols
      - name: Verify generated artifacts
        run: ./Scripts/verify-generated.sh

  release-build:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            git \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            wayland-protocols
      - name: Release build
        run: |
          swift build --disable-index-store -c release
          swift build --disable-index-store -c release --product swift-wayland-demo
          swift build --disable-index-store -c release --product swift-wayland-smoke

  wayland-smoke:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install smoke dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            coreutils \
            git \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            wayland-protocols \
            weston
      - name: Run headless Wayland smoke test
        run: |
          export XDG_RUNTIME_DIR="$(mktemp -d)"
          chmod 700 "$XDG_RUNTIME_DIR"
          weston --backend=headless-backend.so \
            --socket=swiftwayland-ci \
            --idle-time=0 \
            --log=weston.log &
          WESTON_PID="$!"
          trap 'kill "$WESTON_PID" 2>/dev/null || true' EXIT
          export WAYLAND_DISPLAY=swiftwayland-ci
          ./Scripts/smoke-wayland.sh
