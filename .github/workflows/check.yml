name: check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ci_mode:
        description: CI depth to run
        required: true
        default: cheap
        type: choice
        options:
          - cheap
          - full
  schedule:
    - cron: '17 8 * * 1'

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            curl \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-bin \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            ripgrep \
            unzip \
            wayland-protocols
      - name: Install SwiftLint
        run: swift run swl tools install-swiftlint --destination /usr/local/bin
      - name: Tool versions
        run: |
          swift --version
          pkg-config --modversion egl
          pkg-config --modversion gbm
          pkg-config --modversion glesv2
          pkg-config --modversion libdrm
          pkg-config --modversion wayland-client
          pkg-config --modversion xkbcommon
          command -v wayland-scanner
          swiftlint version
      - name: Bootstrap checks
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
        run: |
          swift run swl bootstrap check
          swift run swl bootstrap maintainer-check
          swift run swl bootstrap install-command --package-manager apt-get
          swift run swl bootstrap install-command --package-manager dnf
          swift run swl bootstrap install-command --package-manager pacman
          swift run swl bootstrap install-command --package-manager zypper
          swift run swl bootstrap install-command --package-manager apk
          swift run swl bootstrap install-command --package-manager emerge
          swift run swl bootstrap install-command --package-manager nix
      - name: Cheap check
        if: ${{ github.event_name != 'schedule' && (github.event_name != 'workflow_dispatch' || github.event.inputs.ci_mode != 'full') }}
        run: swift run swl ci cheap
      - name: Full check
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
        run: swift run swl ci check

  generated-freshness:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install generation dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            libwayland-bin \
            libwayland-dev \
            pkg-config \
            wayland-protocols
      - name: Verify generated artifacts
        run: swift run swl protocols verify-generated

  release-build:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            curl \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-bin \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            ripgrep \
            unzip \
            wayland-protocols \
            weston
      - name: Install SwiftLint
        run: swift run swl tools install-swiftlint --destination /usr/local/bin
      - name: Release check
        run: swift run swl ci release

  sanitizer-tsan:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install sanitizer dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            ripgrep \
            wayland-protocols
      - name: ThreadSanitizer tests
        run: swift run swl test tsan

  sanitizer-asan:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install sanitizer dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            ripgrep \
            wayland-protocols
      - name: AddressSanitizer tests
        run: swift run swl test asan

  wayland-smoke:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ci_mode == 'full') }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install smoke dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            coreutils \
            git \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgles-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            wayland-protocols \
            weston
      - name: Run headless smoke checks
        run: swift run swl smoke headless -- swl smoke live
      - name: Run headless integration checks
        run: swift run swl smoke headless -- swl smoke integration
